apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-success-fte
      component: worker
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: worker
    spec:
      containers:
      - name: fte-worker
        image: your-registry/customer-success-fte:latest
        command: ["python", "-m", "production.workers.message_processor"]
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # Workers have no HTTP port — use process liveness check
        livenessProbe:
          exec:
            command: ["python", "-c", "import os; os.kill(1, 0)"]
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
