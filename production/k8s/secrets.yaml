# WARNING: Do NOT commit real secrets here.
# Replace ${...} placeholders with actual values via CI/CD or kubectl create secret.
#
# To create this secret manually:
#   kubectl create secret generic fte-secrets \
#     --namespace customer-success-fte \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=POSTGRES_PASSWORD=... \
#     --from-literal=GMAIL_CREDENTIALS='{"installed":{...}}' \
#     --from-literal=TWILIO_ACCOUNT_SID=AC... \
#     --from-literal=TWILIO_AUTH_TOKEN=... \
#     --from-literal=TWILIO_WHATSAPP_NUMBER=whatsapp:+14155238886

apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  GMAIL_CREDENTIALS: "${GMAIL_CREDENTIALS_JSON}"
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_WHATSAPP_NUMBER: "${TWILIO_WHATSAPP_NUMBER}"
